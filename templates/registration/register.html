{% extends 'store/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow p-8">
    <h1 class="text-3xl font-bold text-amber-900 mb-6">Create Account</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 mb-1">Username</label>
            <input type="text" name="username"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-1">Email</label>
            <input type="email" name="email"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-1">Password</label>
            <input type="password" name="password1"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 mb-1">Confirm Password</label>
            <input type="password" name="password2"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        {% if form.errors %}
        <p class="text-red-500 text-sm mb-4">{{ form.errors }}</p>
        {% endif %}
        <button type="submit"
                class="w-full bg-amber-800 text-white py-2 rounded-lg hover:bg-amber-700 transition">
            Register
        </button>
    </form>
    <p class="mt-4 text-center text-gray-500">Already have an account?
        <a href="{% url 'login' %}" class="text-amber-800 underline">Login here</a>
    </p>
</div>
{% endblock %}
