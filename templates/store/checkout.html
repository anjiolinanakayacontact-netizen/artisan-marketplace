<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout | The Artisan Editorial</title>

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E65100",
                        "on-primary": "#ffffff",

                        "on-background": "#1b1b1b",
                        "outline": "#e0e0e0",

                        "surface-container-high": "#f3f3f3"

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #ffffff;
            color: #1b1b1b;
            font-family: 'Inter', sans-serif;
        }
        .hide-scrollbar::-webkit-scrollbar {

<body class="min-h-screen flex flex-col bg-white text-[#1b1b1b]">
<!-- TopAppBar (from COMPONENTS_13) -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f9]/80 dark:bg-[#1b1b1b]/80 backdrop-blur-lg flex justify-between items-center px-6 h-20 w-full">
<button class="active:scale-95 duration-200 text-[#a43700] dark:text-[#ff8a50]">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-plus-jakarta tracking-tighter font-bold uppercase text-xl font-black tracking-widest text-[#1b1b1b] dark:text-[#f9f9f9]">THE ARTISAN EDITORIAL</h1>
<button class="active:scale-95 duration-200 text-[#a43700] dark:text-[#ff8a50]">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<main class="mt-20 mb-32 px-6 flex-grow">
<!-- Progress Stepper -->
<nav class="py-8">
<div class="flex items-center justify-between relative">
<!-- Track Line -->
<div class="absolute top-1/2 left-0 w-full h-0.5 bg-gray-100 -translate-y-1/2 z-0"></div>
<div class="absolute top-1/2 left-0 w-1/2 h-0.5 bg-primary -translate-y-1/2 z-0"></div>
<!-- Step 1: Active -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-xs">
                    1
                </div>
<span class="text-[9px] font-bold uppercase tracking-widest text-primary">Address</span>
</div>
<!-- Step 2: Payment (Pending) -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold text-xs border border-gray-200">
                    2
                </div>
<span class="text-[9px] font-medium uppercase tracking-widest text-gray-400">Payment</span>
</div>
<!-- Step 3: Review (Pending) -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold text-xs border border-gray-200">
                    3
                </div>
<span class="text-[9px] font-medium uppercase tracking-widest text-gray-400">Review</span>
</div>
</div>
</nav>
<!-- Address Form Section -->
<section class="mb-10">
<div class="flex items-center justify-between mb-6">
<h2 class="font-headline text-xl font-black text-black uppercase tracking-tight">Shipping Details</h2>
<span class="text-[9px] border border-black px-2 py-0.5 rounded-sm text-black font-bold uppercase tracking-widest">Required</span>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-black">Full Name</label>
<input class="w-full bg-white border-2 border-gray-100 rounded-none p-4 focus:border-primary focus:ring-0 text-black font-body text-sm" placeholder="Juan Dela Cruz" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-black">Phone Number</label>
<input class="w-full bg-white border-2 border-gray-100 rounded-none p-4 focus:border-primary focus:ring-0 text-black font-body text-sm" placeholder="+63 9XX XXX XXXX" type="tel"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-black">Street Address</label>
<input class="w-full bg-white border-2 border-gray-100 rounded-none p-4 focus:border-primary focus:ring-0 text-black font-body text-sm" placeholder="House No., Street Name" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-black">Barangay</label>
<input class="w-full bg-white border-2 border-gray-100 rounded-none p-4 focus:border-primary focus:ring-0 text-black font-body text-sm" placeholder="Brgy. 123" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-black">City</label>
<input class="w-full bg-white border-2 border-gray-100 rounded-none p-4 focus:border-primary focus:ring-0 text-black font-body text-sm" placeholder="Manila" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-black">Province</label>
<input class="w-full bg-white border-2 border-gray-100 rounded-none p-4 focus:border-primary focus:ring-0 text-black font-body text-sm" placeholder="Metro Manila" type="text"/>
</div>
</div>
</section>
<!-- Payment Options -->
<section class="mb-10">
<h2 class="font-headline text-xl font-black text-black mb-6 uppercase tracking-tight">Payment Method</h2>
<div class="space-y-3">
<!-- GCash Card -->
<label class="relative flex items-center p-4 rounded-none bg-white border-2 border-gray-100 transition-all cursor-pointer has-[:checked]:border-primary shadow-sm">
<input checked="" class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-full bg-[#E65100]/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="flex-grow">
<p class="font-bold text-black text-sm">GCash</p>
<p class="text-[10px] text-gray-500 uppercase tracking-tighter">Instant E-Wallet Transfer</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-gray-300 peer-checked:border-primary flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Maya Card -->
<label class="relative flex items-center p-4 rounded-none bg-white border-2 border-gray-100 transition-all cursor-pointer has-[:checked]:border-primary shadow-sm">
<input class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-full bg-black/5 flex items-center justify-center text-black">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="flex-grow">
<p class="font-bold text-black text-sm">Maya</p>
<p class="text-[10px] text-gray-500 uppercase tracking-tighter">Digital Bank &amp; Wallet</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-gray-300 peer-checked:border-primary flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- COD Card -->
<label class="relative flex items-center p-4 rounded-none bg-white border-2 border-gray-100 transition-all cursor-pointer has-[:checked]:border-primary shadow-sm">
<input class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-full bg-black/5 flex items-center justify-center text-black">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<div class="flex-grow">
<p class="font-bold text-black text-sm">Cash on Delivery</p>
<p class="text-[10px] text-gray-500 uppercase tracking-tighter">Pay upon receiving package</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-gray-300 peer-checked:border-primary flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</label>
</div>
</section>

<section class="bg-gray-50 rounded-lg p-6 mb-12 border border-gray-100">
<h2 class="font-headline text-md font-black text-black mb-4 flex items-center gap-2 uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">receipt_long</span>
            Order Summary

<div class="space-y-4">
<div class="flex justify-between items-center text-sm">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-none bg-white border border-gray-200 overflow-hidden">
<img alt="Native Basket" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkDLELGA89u7irMLPB7VOOtsNd7t-8XWU6dGwgnS9Gt_ZmZmmy3nCXt_60bir8OE5PkoSjrrn5BluNarq52cG9dduMxYT73z2GhlVAQKJo1wPyf3rp4brGmUMqGbeTtm_94C6rBBNwy1XfT8Je8wpNj0Hcz1GIjLutWsvUhzG9X6IboKakUmYeeakpejchT77K6JKIqOqSPksM6PXs9wE8oprOpGabtsN5lCwGlMe1_O1tF_x5_ANYafDJltdQKj9ZIUI757-nL-X8"/>
</div>
<span class="font-medium text-xs">Abacá Basket (x1)</span>
</div>
<span class="font-bold">₱1,250</span>
</div>
<div class="flex justify-between items-center text-sm">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-none bg-white border border-gray-200 overflow-hidden">
<img alt="Clay Pot" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhO3mHC7eSjENGTVbuJi6-H9875l8VtINmVUcYdvk8tdqYHMrlNu0t6h4qiS_34iHO-kGxcVzfIxXZBh9XmcEH_IzHlgs229I7RXV7oLzuMJvevOGE2UUbxFzyy-E6vDC9BydDFh3cpwL5sXgMZn17o-Zlkz8U83jtqA8t9mNGlzJOOu4JU3xNyrlbpoblj86Bn2RS1MaOk_6iau5QawiokMH-L6XzsP5a1c6D3NeX2XI_j6tezsaPNEr4QskAi41_p0hcYN0qXkrg"/>
</div>
<span class="font-medium text-xs">Burnay Clay Pot (x2)</span>
</div>
<span class="font-bold">₱840</span>
</div>
<div class="pt-4 border-t border-gray-200 space-y-2">
<div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase">
<span>Subtotal</span>
<span>₱2,090</span>
</div>
<div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase">
<span>Shipping Fee</span>
<span>₱150</span>
</div>
<div class="flex justify-between items-center pt-2 text-black">
<span class="font-black uppercase tracking-widest text-[10px]">Total Amount</span>
<span class="text-xl font-black">₱2,240</span>
</div>
</div>
</div>
</section>
<!-- CTA Action -->
<div class="fixed bottom-20 left-0 w-full p-6 bg-white/95 backdrop-blur-sm z-40 border-t border-gray-100">
<button class="w-full bg-[#E65100] text-white font-headline font-black py-4 rounded-none shadow-lg active:scale-95 duration-200 uppercase tracking-widest text-sm">
            Place Order
        </button>
</div>
</main>
<!-- BottomNavBar (from COMPONENTS_13) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe px-4 bg-[#ffffff] dark:bg-[#121212] z-50 rounded-t-2xl shadow-2xl">
<div class="flex flex-col items-center justify-center text-[#1b1b1b]/40 dark:text-[#f9f9f9]/40 hover:text-[#a43700] dark:hover:text-[#ff8a50] transition-colors">

<span class="text-[10px] font-bold uppercase tracking-widest font-plus-jakarta">Curated</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1b1b1b]/40 dark:text-[#f9f9f9]/40 hover:text-[#a43700] dark:hover:text-[#ff8a50] transition-colors">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-plus-jakarta">Discover</span>
</div>
<!-- Active Tab: Artisans (as proxy for current flow) -->
<div class="flex flex-col items-center justify-center text-[#a43700] dark:text-[#ff8a50] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#a43700] after:rounded-full active:scale-90 duration-300 ease-out">

<div class="flex flex-col items-center justify-center text-[#1b1b1b]/40 dark:text-[#f9f9f9]/40 hover:text-[#a43700] dark:hover:text-[#ff8a50] transition-colors">
<span class="material-symbols-outlined">person</span>
