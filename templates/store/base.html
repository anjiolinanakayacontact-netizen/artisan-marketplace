{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Marketplace</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-amber-50 text-gray-800">
    <nav class="bg-amber-800 text-white px-6 py-4 flex justify-between items-center">
        <a href="{% url 'home' %}" class="text-2xl font-bold tracking-wide">🧵 Artisan Market</a>
        <div class="flex gap-4 items-center">
            {% if user.is_authenticated %}
                <span class="text-amber-200">Hi, {{ user.username }}!</span>
                <a href="{% url 'logout' %}" class="bg-amber-700 hover:bg-amber-600 px-4 py-2 rounded-lg transition">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="hover:text-amber-200 transition">Login</a>
                <a href="{% url 'register' %}" class="bg-white text-amber-800 font-semibold px-4 py-2 rounded-lg hover:bg-amber-100 transition">Register</a>
            {% endif %}
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
