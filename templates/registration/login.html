<header class="fixed top-0 w-full z-50 bg-[#ffffff]/80 dark:bg-[#1b1b1b]/80 backdrop-blur-lg">
<div class="flex justify-between items-center px-6 h-20 w-full">
<div class="flex items-center gap-4">
<button class="text-[#1b1b1b] dark:text-[#f9f9f9] hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline tracking-tighter font-bold uppercase text-xl font-black tracking-widest text-[#1b1b1b] dark:text-[#f9f9f9]">THE ARTISAN EDITORIAL</h1>
</div>
<div class="flex items-center">
<button class="text-[#1b1b1b] dark:text-[#f9f9f9] hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</div>
</div>
</header>
<main class="flex-grow pt-28 pb-32 px-6 flex flex-col items-center justify-center relative">
<!-- Brand Identity Section -->
<div class="text-center mb-12 z-10">
<div class="w-16 h-16 bg-on-background rounded-full flex items-center justify-center mx-auto mb-8">
<span class="material-symbols-outlined text-white text-3xl" data-icon="styler">styler</span>
</div>
<h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface/60 font-medium">Log in to your artisan account</p>
</div>
<!-- Auth Card - Minimalist and Bold -->
<div class="w-full max-w-md bg-white border-2 border-on-background rounded-lg p-10 relative z-10">
<!-- Tabs -->
<div class="flex mb-10 border-b-2 border-outline-variant">
<button class="flex-1 py-4 text-sm font-black uppercase tracking-widest border-b-4 border-primary text-on-background">Sign In</button>
<button class="flex-1 py-4 text-sm font-bold uppercase tracking-widest text-on-surface/40 hover:text-on-background transition-colors">Register</button>
</div>
<!-- Login Form -->
<form class="space-y-8">
<div class="space-y-3">
<label class="block text-[10px] font-black uppercase tracking-[0.2em] text-on-background">Email Address</label>
<input class="w-full bg-white border-2 border-on-background rounded-none py-4 px-4 text-on-surface font-bold placeholder:text-outline/30 focus:ring-0 focus:border-primary transition-all" placeholder="name@domain.com" type="email"/>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center">
<label class="block text-[10px] font-black uppercase tracking-[0.2em] text-on-background">Password</label>
<a class="text-[10px] font-bold uppercase tracking-wider text-primary hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full bg-white border-2 border-on-background rounded-none py-4 px-4 text-on-surface font-bold placeholder:text-outline/30 focus:ring-0 focus:border-primary transition-all" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary text-on-primary font-black uppercase tracking-widest py-5 rounded-none hover:bg-black transition-colors active:scale-[0.98] duration-150" type="submit">Log In</button>
</form>
<!-- Divider -->
<div class="relative my-10 text-center">
<span class="bg-white px-4 text-[10px] font-black uppercase tracking-[0.3em] text-on-background relative z-10">Social Join</span>
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-on-background/10 -translate-y-1/2"></div>
</div>
<!-- Social Button -->
<button class="w-full border-2 border-on-background text-on-background font-black uppercase tracking-widest py-5 px-6 rounded-none flex items-center justify-center gap-3 hover:bg-on-background hover:text-white transition-all active:scale-[0.98] duration-150">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
            Continue with Google
        </button>
</div>
<div class="mt-10 text-center z-10">
<p class="text-[10px] font-black uppercase tracking-widest text-on-surface/50">Need an account?</p>
<button class="mt-2 text-primary font-black uppercase tracking-[0.2em] border-b-2 border-primary hover:text-on-background hover:border-on-background transition-all">Sign Up Free</button>
</div>

<!-- BottomNavBar (from COMPONENTS_13) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe px-4 bg-[#ffffff] dark:bg-[#121212] z-50 rounded-t-2xl shadow-2xl">
<div class="flex flex-col items-center justify-center text-[#1b1b1b]/40 dark:text-[#f9f9f9]/40 hover:text-[#a43700] dark:hover:text-[#ff8a50] transition-colors">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-plus-jakarta mt-1">Curated</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1b1b1b]/40 dark:text-[#f9f9f9]/40 hover:text-[#a43700] dark:hover:text-[#ff8a50] transition-colors">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-plus-jakarta mt-1">Discover</span>

</div>

<div class="pb-28 text-center px-8">
<p class="font-['Inter'] text-[10px] font-black uppercase tracking-[0.4em] text-on-background/20">The Artisan Editorial © 2024</p>
